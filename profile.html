<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthGuard — Profile</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#0a0e1a; color:#e2e8f0; padding:20px; }
.app { max-width:420px; margin:0 auto; }
h1 { font-size:1.3rem; font-weight:800; text-align:center; margin:16px 0 4px;
background:linear-gradient(135deg,#00e5c0,#a78bfa);
-webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.card { background:#111827; border:1px solid #1e2d45; border-radius:12px;
padding:18px; margin:12px 0; }
.card-title { font-size:12px; font-weight:700; color:#00e5c0;
text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }
label { display:block; font-size:12px; color:#94a3b8; margin-bottom:4px; }
input, select { width:100%; padding:10px 12px; background:#0a0e1a;
border:1px solid #1e2d45; border-radius:8px; color:#e2e8f0;
font-size:13px; margin-bottom:12px; }
input:focus, select:focus { border-color:#00e5c0; outline:none; }
.row { display:flex; gap:10px; }
.row > div { flex:1; }
.conditions { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.cond-item { display:flex; align-items:center; gap:8px;
background:#0a0e1a; border:1px solid #1e2d45;
border-radius:8px; padding:8px 10px; cursor:pointer; }
.cond-item input[type=checkbox] { width:auto; margin:0; }
.cond-item label { margin:0; font-size:12px; color:#94a3b8; cursor:pointer; }
.cond-item.checked { border-color:#f87171; background:rgba(248,113,113,0.08); }
.cond-item.checked label { color:#f87171; }
#bmr-result { background:#0a0e1a; border-radius:8px; padding:12px;
font-size:12px; color:#94a3b8; margin-top:8px; }
#bmr-result span { color:#00e5c0; font-weight:700; font-size:15px; }
.btn { width:100%; padding:14px; border-radius:10px; border:none;
font-size:14px; font-weight:700; cursor:pointer; margin-top:4px;
background:linear-gradient(135deg,#00e5c0,#059669); color:#fff; }
.delete-btn { background:transparent; border:1px solid #1e2d45;
color:#64748b; margin-top:8px; }
.delete-btn:hover { border-color:#f87171; color:#f87171; }
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
background:#34d399; color:#0a0e1a; padding:10px 20px;
border-radius:50px; font-weight:700; font-size:13px;
display:none; z-index:999; }
</style>
</head>
<body>
<div class="app">
<h1>n Health Profile</h1>
<!-- Basic Info -->
<div class="card">
<div class="card-title">n Basic Information</div>
<label>Your Name (identifies your data)</label>
<input type="text" id="name" placeholder="e.g. Priya">
<div class="row">
<div><label>Age (years)</label><input type="number" id="age" min="10" max="100"
placeholder="25"></div>
<div><label>Gender</label>
<select id="gender">
<option value="">Select...</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other / Prefer not to say</option>
</select>
</div>
</div>
<div class="row">
<div><label>Height (cm)</label><input type="number" id="height" min="100" max="250"
placeholder="165"></div>
<div><label>Weight (kg)</label><input type="number" id="weight" min="30" max="300"
placeholder="65"></div>
</div>
<label>Activity Level</label>
<select id="activity">
<option value="1.2">Sedentary (desk job, little exercise)</option>
<option value="1.375">Lightly active (exercise 1-3 days/week)</option>
<option value="1.55" selected>Moderately active (exercise 3-5 days/week)</option>
<option value="1.725">Very active (exercise 6-7 days/week)</option>
<option value="1.9">Extra active (physical job + daily exercise)</option>
</select>
<div id="bmr-result">Fill in your details to see your personalised calorie goal.</div>
</div>
<!-- Medical Conditions -->
<div class="card">
<div class="card-title">nn Medical Conditions (select all that apply)</div>
<div class="conditions" id="conditions">
<div class="cond-item" onclick="toggleCond(this, 'diabetes')">
<input type="checkbox" id="c_diabetes"><label for="c_diabetes">n Diabetes</label></div>
<div class="cond-item" onclick="toggleCond(this, 'hypertension')">
<input type="checkbox" id="c_htn"><label for="c_htn">¤n Hypertension</label></div>
<div class="cond-item" onclick="toggleCond(this, 'lactose_intolerance')">
<input type="checkbox" id="c_lac"><label for="c_lac">n Lactose Intolerant</label></div>
<div class="cond-item" onclick="toggleCond(this, 'gluten_sensitivity')">
<input type="checkbox" id="c_glu"><label for="c_glu">n Gluten Sensitive</label></div>
<div class="cond-item" onclick="toggleCond(this, 'high_cholesterol')">
<input type="checkbox" id="c_cho"><label for="c_cho">n High Cholesterol</label></div>
<div class="cond-item" onclick="toggleCond(this, 'kidney_disease')">
<input type="checkbox" id="c_kid"><label for="c_kid">n Kidney Disease</label></div>
<div class="cond-item" onclick="toggleCond(this, 'thyroid_disorder')">
<input type="checkbox" id="c_thy"><label for="c_thy">n Thyroid Disorder</label></div>
<div class="cond-item" onclick="toggleCond(this, 'nut_allergy')">
<input type="checkbox" id="c_nut"><label for="c_nut">n Nut Allergy</label></div>
</div>
</div>
<button class="btn" onclick="saveProfile()">n Save Profile</button>
<button class="btn delete-btn" onclick="deleteAllData()">nn Delete All My Data</button>
<a href="index.html" style="display:block; text-align:center; color:#64748b;
font-size:12px; margin-top:12px;">← Back to Scanner</a>
</div>
<div class="toast" id="toast"></div>
<script>
const CONDITIONS = [];
function toggleCond(el, key) {
const cb = el.querySelector("input");
cb.checked = !cb.checked;
el.classList.toggle("checked", cb.checked);
const idx = CONDITIONS.indexOf(key);
if (cb.checked && idx === -1) CONDITIONS.push(key);
else if (!cb.checked && idx > -1) CONDITIONS.splice(idx, 1);
}
function calcBMR() {
const age = +document.getElementById("age").value;
const gender = document.getElementById("gender").value;
const h = +document.getElementById("height").value;
const w = +document.getElementById("weight").value;
const act = +document.getElementById("activity").value;
if (!age || !h || !w || !gender) return null;
// Mifflin-St Jeor equation
let bmr = 10*w + 6.25*h - 5*age + (gender === "male" ? 5 : -161);
return { bmr: Math.round(bmr), tdee: Math.round(bmr * act) };
}
function updateBMR() {
const r = calcBMR();
const el = document.getElementById("bmr-result");
if (!r) { el.textContent = "Fill in your details to see your calorie goal."; return; }
el.innerHTML = `BMR: <span>${r.bmr}</span> kcal ·
Daily goal (TDEE): <span>${r.tdee}</span> kcal ·
BMI: <span>${calcBMI()}</span>`;
}
function calcBMI() {
const h = +document.getElementById("height").value / 100;
const w = +document.getElementById("weight").value;
return h && w ? (w / (h*h)).toFixed(1) : "?";
}
["age","gender","height","weight","activity"].forEach(id => {
document.getElementById(id).addEventListener("input", updateBMR);
});
function saveProfile() {
const r = calcBMR();
const profile = {
name: document.getElementById("name").value,
age: +document.getElementById("age").value,
gender: document.getElementById("gender").value,
height_cm: +document.getElementById("height").value,
weight_kg: +document.getElementById("weight").value,
activity: +document.getElementById("activity").value,
conditions: [...CONDITIONS],
bmr: r ? r.bmr : 1800,
tdee: r ? r.tdee : 2000,
bmi: calcBMI(),
};
if (!profile.name) { showToast("nn Please enter your name."); return; }
localStorage.setItem("hg_profile", JSON.stringify(profile));
showToast("n Profile saved!");
setTimeout(() => location.href = "index.html", 1200);
}
function deleteAllData() {
if (!confirm("Delete all your profile data and scan history?")) return;
localStorage.removeItem("hg_profile");
localStorage.removeItem("hg_history");
showToast("nn All data deleted.");
setTimeout(() => location.reload(), 1200);
}
function showToast(msg) {
const t = document.getElementById("toast");
t.textContent = msg; t.style.display = "block";
setTimeout(() => t.style.display = "none", 2000);
}
// Load existing profile
const p = JSON.parse(localStorage.getItem("hg_profile") || "{}");
if (p.name) {
document.getElementById("name").value = p.name || "";
document.getElementById("age").value = p.age || "";
document.getElementById("gender").value = p.gender || "";
document.getElementById("height").value = p.height_cm || "";
document.getElementById("weight").value = p.weight_kg || "";
document.getElementById("activity").value = p.activity || "1.55";
(p.conditions || []).forEach(key => {
const items = document.querySelectorAll(".cond-item");
items.forEach(el => {
if (el.getAttribute("onclick").includes(key)) {
el.querySelector("input").checked = true;
el.classList.add("checked");
CONDITIONS.push(key);
}
});
});
updateBMR();
}
</script>
</body>
</html>
