<!-- HealthGuard AI — Barcode Scanner v3 (Fixed: camera, multi-source, test) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>HealthGuard AI</title>
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0e1a; color: #e2e8f0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .app { width: 100%; max-width: 420px; }
    h1 {
      font-size: 1.5rem; font-weight: 800; text-align: center; margin: 16px 0 6px;
      background: linear-gradient(135deg, #00e5c0, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 20px; }
    #video-wrap {
      position: relative; width: 100%; border-radius: 16px; overflow: hidden;
      background: #111; aspect-ratio: 1; border: 2px solid rgba(0,229,192,0.35);
    }
    /*
     * FIX: transform: none — the rear (environment) camera should NEVER be mirrored.
     * The original code sometimes picked the front camera which appeared inverted.
     * We now force facingMode:'environment' so this style is just a safety fallback.
     */
    #preview {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transform: none;  /* ← was missing; front-camera default was mirroring the feed */
    }
    .scan-line {
      position: absolute; width: 70%; height: 2px; left: 15%;
      background: rgba(0,229,192,0.8); box-shadow: 0 0 10px rgba(0,229,192,0.5);
      animation: scan 2s ease-in-out infinite; pointer-events: none;
    }
    @keyframes scan { 0%,100%{top:20%} 50%{top:78%} }
    .cam-badge {
      position: absolute; bottom: 8px; right: 10px;
      font-size: 11px; color: rgba(0,229,192,0.7);
      background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 20px;
    }
    #status {
      background: #111827; border: 1px solid #1e2d45; border-radius: 12px;
      padding: 16px; margin: 14px 0; min-height: 70px;
      display: flex; align-items: center; gap: 12px;
    }
    #si { font-size: 1.5rem; flex-shrink: 0; }
    #st { font-size: 14px; color: #94a3b8; line-height: 1.5; }
    #result {
      background: #111827; border: 1px solid #1e2d45; border-radius: 12px;
      padding: 18px; margin: 10px 0; display: none;
    }
    .badge {
      display: inline-block; padding: 4px 12px; border-radius: 50px;
      font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase;
    }
    .healthy   { background: rgba(52,211,153,0.2);  color: #34d399; }
    .moderate  { background: rgba(251,191,36,0.2);  color: #fbbf24; }
    .unhealthy { background: rgba(248,113,113,0.2); color: #f87171; }
    .unknown   { background: rgba(100,116,139,0.2); color: #94a3b8; }
    .product-name { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .summary { font-size: 14px; color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }
    .tip { font-size: 13px; color: #60a5fa; background: rgba(96,165,250,0.08);
           border-left: 2px solid #60a5fa; padding: 8px 12px; border-radius: 0 6px 6px 0; }
    .source-tag {
      font-size: 11px; color: #475569; margin-top: 10px;
      display: flex; align-items: center; gap: 4px;
    }
    #cal-bar { margin-top: 14px; background: rgba(255,255,255,0.05); border-radius: 8px; height: 8px; overflow: hidden; }
    #cal-fill { height: 100%; border-radius: 8px; transition: width 0.6s ease; }
    #cal-txt { font-size: 12px; color: #64748b; margin-top: 6px; }
    .btns { display: flex; gap: 10px; margin-top: 14px; }
    .btn {
      flex: 1; padding: 14px; border-radius: 10px; border: none;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .primary   { background: linear-gradient(135deg, #00e5c0, #059669); color: white; }
    .secondary { background: transparent; border: 1px solid #1e2d45; color: #64748b; }
    .spin {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,229,192,0.3); border-top-color: #00e5c0;
      border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: middle;
    }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <h1>🏥 HealthGuard AI</h1>
    <p class="sub">Point camera at any food barcode</p>

    <div id="video-wrap">
      <video id="preview" playsinline muted autoplay></video>
      <div class="scan-line"></div>
      <div class="cam-badge" id="cam-badge">📷 rear</div>
    </div>

    <div id="status">
      <div id="si">📷</div>
      <div id="st">Starting camera...</div>
    </div>

    <div id="result">
      <span id="badge" class="badge"></span>
      <div id="pname" class="product-name"></div>
      <div id="sum"  class="summary"></div>
      <div id="tip"  class="tip" style="display:none"></div>
      <div id="src"  class="source-tag"></div>
      <div id="cal-bar"><div id="cal-fill"></div></div>
      <div id="cal-txt"></div>
    </div>

    <div class="btns">
      <button class="btn primary"    onclick="startScan()">🔄 Scan Again</button>
      <button class="btn secondary"  onclick="clearResult()">✕ Clear</button>
    </div>
  </div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────
    // ⚠️ Replace this with your deployed Apps Script URL (Phase 4)
    const WEBHOOK = 'YOUR_APPS_SCRIPT_URL_HERE';

    // ─── GLOBALS ───────────────────────────────────────────
    const reader = new ZXing.BrowserMultiFormatReader();
    let scanning = false;

    // ─── HELPERS ───────────────────────────────────────────
    function setStatus(icon, html) {
      document.getElementById('si').innerHTML  = icon;
      document.getElementById('st').innerHTML  = html;
    }

    function clearResult() {
      document.getElementById('result').style.display = 'none';
    }

    // ─── CAMERA START ──────────────────────────────────────
    /*
     * FIX — Camera inversion root cause:
     * The original code did `devices[devices.length - 1].deviceId` which on
     * many Android/iOS devices returns the FRONT camera, producing a mirrored
     * (inverted) video feed.  The correct fix is to request the rear camera
     * directly via the `facingMode: 'environment'` constraint.
     *
     * Strategy:
     *   1. Try `decodeFromConstraints` with `facingMode: 'environment'` (ideal path)
     *   2. If that fails (older browsers / desktops), fall back to enumerating
     *      devices and picking the one whose label includes 'back/rear/environment'
     *   3. Last resort: pick the last device index (original behaviour)
     */
    async function startScan() {
      if (scanning) return;
      scanning = true;
      clearResult();
      setStatus('📷', 'Starting rear camera...');

      try {
        // ── Path 1: facingMode constraint (best for phones) ──
        await reader.decodeFromConstraints(
          {
            audio: false,
            video: {
              facingMode: { ideal: 'environment' }, // ← requests back camera
              width:  { ideal: 1280 },
              height: { ideal: 720  }
            }
          },
          'preview',
          onDecode
        );
        document.getElementById('cam-badge').textContent = '📷 rear';
        setStatus('📷', 'Scanning… aim straight at a barcode.');

      } catch (constraintErr) {
        console.warn('facingMode constraint failed, falling back:', constraintErr.message);

        // ── Path 2: enumerate devices, prefer the one labelled "back" ──
        try {
          const devices = await reader.listVideoInputDevices();

          let chosen = devices.find(d =>
            /back|rear|environment/i.test(d.label)
          );

          if (!chosen) {
            // ── Path 3: last device index (original behaviour) ──
            chosen = devices[devices.length - 1];
            document.getElementById('cam-badge').textContent = '📷 fallback';
          } else {
            document.getElementById('cam-badge').textContent = '📷 rear';
          }

          await reader.decodeFromVideoDevice(chosen.deviceId, 'preview', onDecode);
          setStatus('📷', 'Scanning… aim straight at a barcode.');

        } catch (enumErr) {
          setStatus('❌', 'Camera error: ' + enumErr.message + '<br><small>Make sure you\'re on HTTPS (the github.io URL).</small>');
          scanning = false;
        }
      }
    }

    // ─── DECODE CALLBACK ───────────────────────────────────
    async function onDecode(res, err) {
      // ZXing calls this repeatedly; only act on the first successful read
      if (!res || !scanning) return;

      scanning = false;
      reader.reset();

      const barcode = res.getText();
      setStatus(
        '<span class="spin"></span>',
        `Found: <strong style="color:#00e5c0">${barcode}</strong><br>Fetching health data…`
      );

      await analyse(barcode);
    }

    // ─── SEND TO BACKEND ───────────────────────────────────
    async function analyse(barcode) {
      try {
        const res = await fetch(WEBHOOK, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ barcode, ts: new Date().toISOString() })
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();
        showResult(data);

      } catch(e) {
        setStatus('❌',
          `Could not reach server.<br>
          <small>${e.message}</small><br>
          <small>Check that your WEBHOOK URL is set correctly in index.html.</small>`
        );
      }
    }

    // ─── DISPLAY RESULT ────────────────────────────────────
    function showResult(d) {
      const ratingMap = {
        'Healthy':            'healthy',
        'Moderately Healthy': 'moderate',
        'Unhealthy':          'unhealthy',
        'Unknown':            'unknown'
      };

      const badge = document.getElementById('badge');
      badge.textContent  = d.rating || '?';
      badge.className    = 'badge ' + (ratingMap[d.rating] || 'unknown');

      document.getElementById('pname').textContent = d.product_name || 'Unknown product';
      document.getElementById('sum').textContent   = d.summary      || '';

      const tipEl = document.getElementById('tip');
      if (d.tip) {
        tipEl.textContent    = '💡 ' + d.tip;
        tipEl.style.display  = 'block';
      } else {
        tipEl.style.display  = 'none';
      }

      // Show which database found the product
      const srcEl = document.getElementById('src');
      if (d.data_source) {
        srcEl.innerHTML = `🗄️ Data from: <strong style="color:#64748b">${d.data_source}</strong>`;
      } else {
        srcEl.textContent = '';
      }

      // Calorie progress bar
      if (d.consumed_today != null && d.goal) {
        const pct = Math.min(100, (d.consumed_today / d.goal) * 100);
        const fill = document.getElementById('cal-fill');
        fill.style.width      = pct + '%';
        fill.style.background = pct > 90 ? '#f87171' : pct > 70 ? '#fbbf24' : '#34d399';
        document.getElementById('cal-txt').textContent =
          `${d.consumed_today} / ${d.goal} kcal today`;
      }

      document.getElementById('result').style.display = 'block';
      setStatus('✅', 'Analysis complete! Tap <strong>Scan Again</strong> for next product.');
    }

    // ─── AUTO-START ────────────────────────────────────────
    window.addEventListener('load', startScan);
  </script>
</body>
</html>
