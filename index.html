<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<title>HealthGuard AI</title>
<!-- ZXing barcode library -->
<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
background: #0a0e1a; color: #e2e8f0; min-height:100vh;
display:flex; flex-direction:column; align-items:center; padding:20px; }
.app { width:100%; max-width:420px; }
h1 { font-size:1.5rem; font-weight:800; text-align:center; margin:16px 0 4px;
background:linear-gradient(135deg,#00e5c0,#a78bfa);
-webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.sub { text-align:center; color:#64748b; font-size:12px; margin-bottom:8px; }
.nav { display:flex; gap:8px; margin-bottom:14px; }
.nav-btn { flex:1; padding:10px; border-radius:8px; border:1px solid #1e2d45;
background:transparent; color:#64748b; font-size:12px;
font-weight:600; cursor:pointer; text-align:center; }
.nav-btn:hover { border-color:#00e5c0; color:#00e5c0; }
/* nn FIX: rear camera video must NOT be mirrored nn */
#video-wrap { position:relative; width:100%; border-radius:16px; overflow:hidden;
background:#111; aspect-ratio:1; border:2px solid rgba(0,229,192,0.35); }
#preview { width:100%; height:100%; object-fit:cover; display:block;
transform:none; } /* transform:none prevents front-cam mirror flip */
.scan-line { position:absolute; width:70%; height:2px; left:15%;
background:rgba(0,229,192,0.8); animation:scan 2s ease-in-out infinite; }
@keyframes scan { 0%,100%{top:20%} 50%{top:78%} }
.cam-badge { position:absolute; bottom:8px; right:10px; font-size:10px;
color:rgba(0,229,192,0.8); background:rgba(0,0,0,0.5);
padding:2px 8px; border-radius:20px; }
#profile-bar { background:#111827; border:1px solid #1e2d45; border-radius:10px;
padding:10px 14px; margin:10px 0; font-size:12px; color:#94a3b8; }
#profile-bar span { color:#00e5c0; font-weight:700; }
#status { background:#111827; border:1px solid #1e2d45; border-radius:12px;
padding:16px; margin:10px 0; min-height:70px;
display:flex; align-items:center; gap:12px; }
#si { font-size:1.5rem; flex-shrink:0; }
#st { font-size:13px; color:#94a3b8; line-height:1.5; }
#result { background:#111827; border:1px solid #1e2d45; border-radius:12px;
padding:18px; margin:10px 0; display:none; }
.badge { display:inline-block; padding:4px 12px; border-radius:50px;
font-size:11px; font-weight:700; margin-bottom:8px; text-transform:uppercase; }
.healthy { background:rgba(52,211,153,0.2); color:#34d399; }
n HealthGuard AI v2 — Complete Build Guide | Relay.app + Claude Sonnet + Gmail + GitHub Pages Page 7
.moderate { background:rgba(251,191,36,0.2); color:#fbbf24; }
.unhealthy { background:rgba(248,113,113,0.2); color:#f87171; }
.product-name { font-size:15px; font-weight:700; margin-bottom:6px; color:#fff; }
.summary { font-size:13px; color:#94a3b8; line-height:1.6; margin-bottom:8px; }
.alerts { font-size:12px; color:#f87171; background:rgba(248,113,113,0.08);
border-left:2px solid #f87171; padding:8px 10px;
border-radius:0 6px 6px 0; margin-bottom:8px; }
.tip { font-size:12px; color:#60a5fa; background:rgba(96,165,250,0.08);
border-left:2px solid #60a5fa; padding:8px 10px;
border-radius:0 6px 6px 0; }
.src-tag { font-size:10px; color:#475569; margin-top:8px; }
#cal-wrap { margin-top:12px; }
#cal-bar { background:rgba(255,255,255,0.05); border-radius:8px;
height:8px; overflow:hidden; margin:4px 0; }
#cal-fill { height:100%; border-radius:8px; transition:width 0.6s ease; }
#cal-txt { font-size:11px; color:#64748b; }
.btns { display:flex; gap:8px; margin-top:12px; }
.btn { flex:1; padding:13px; border-radius:10px; border:none;
font-size:13px; font-weight:700; cursor:pointer; }
.primary { background:linear-gradient(135deg,#00e5c0,#059669); color:#fff; }
.secondary { background:transparent; border:1px solid #1e2d45; color:#64748b; }
.spin { display:inline-block; width:13px; height:13px;
border:2px solid rgba(0,229,192,0.3); border-top-color:#00e5c0;
border-radius:50%; animation:sp 0.8s linear infinite;
vertical-align:middle; }
@keyframes sp { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
<h1>n HealthGuard AI</h1>
<p class="sub">Point rear camera at any food barcode</p>
<div class="nav">
<div class="nav-btn" onclick="location.href='profile.html'">n Profile</div>
<div class="nav-btn" onclick="location.href='history.html'">n History</div>
</div>
<!-- Profile bar — shows name + daily calorie target -->
<div id="profile-bar">n Loading profile...</div>

<div id="video-wrap">
<video id="preview" playsinline muted autoplay></video>
<div class="scan-line"></div>
<div class="cam-badge" id="cam-badge">n rear</div>
</div>
<div id="status"><div id="si">n</div><div id="st">Starting camera...</div></div>
<div id="result">
<span id="badge" class="badge"></span>
<div id="pname" class="product-name"></div>
<div id="sum" class="summary"></div>
<div id="med-alerts" class="alerts" style="display:none"></div>
<div id="tip" class="tip" style="display:none"></div>
<div id="src" class="src-tag"></div>
<div id="cal-wrap">
<div id="cal-bar"><div id="cal-fill"></div></div>
<div id="cal-txt"></div>
</div>
</div>
<div class="btns">
<button class="btn primary" onclick="startScan()">n Scan Again</button>
<button class="btn secondary" onclick="clearResult()">5 Clear</button>
</div>
</div>
<script>
// nn REPLACE with your Relay.app webhook URL (Phase 2, Step 5)
const WEBHOOK = "YOUR_RELAY_WEBHOOK_URL_HERE";
const reader = new ZXing.BrowserMultiFormatReader();
let scanning = false;
// nn Load profile from localStorage nnnnnnnnnnnnnnnnnnnnnn
function loadProfile() {
const p = JSON.parse(localStorage.getItem("hg_profile") || "{}");
const bar = document.getElementById("profile-bar");
if (p.name) {
const goal = p.tdee || 2000;
bar.innerHTML = `n <span>${p.name}</span> · Goal: <span>${goal} kcal/day</span>`;
} else {
  n HealthGuard AI v2 — Complete Build Guide | Relay.app + Claude Sonnet + Gmail + GitHub Pages Page 9
bar.innerHTML = `nn <a href="profile.html" style="color:#fbbf24">
Set up your profile</a> for personalised calorie limits`;
}
return p;
}
// nn Camera start (FIXED: always uses rear camera) nnnnnnnn
async function startScan() {
if (scanning) return;
scanning = true;
document.getElementById("result").style.display = "none";
setStatus("n", "Starting rear camera...");
try {
// PRIMARY: facingMode constraint — directly requests back camera.
// This prevents the front camera mirror/inversion bug.
await reader.decodeFromConstraints(
{ audio: false, video: { facingMode: { ideal: "environment" },
width: { ideal: 1280 }, height: { ideal: 720 } } },
"preview", onDecode
);
document.getElementById("cam-badge").textContent = "n rear";
setStatus("n", "Scanning — aim at a barcode.");
} catch(e1) {
// FALLBACK: enumerate devices, pick one labelled "back/rear"
try {
const devices = await reader.listVideoInputDevices();
let chosen = devices.find(d => /back|rear|environment/i.test(d.label))
|| devices[devices.length - 1];
await reader.decodeFromVideoDevice(chosen.deviceId, "preview", onDecode);
setStatus("n", "Scanning — aim at a barcode.");
} catch(e2) {
setStatus("n", "Camera error: " + e2.message);
scanning = false;
}
}
}
function onDecode(res) {
if (!res || !scanning) return;
  n HealthGuard AI v2 — Complete Build Guide | Relay.app + Claude Sonnet + Gmail + GitHub Pages Page 10
scanning = false; reader.reset();
const barcode = res.getText();
setStatus("<span class=\"spin\"></span>",
`Found: <strong style="color:#00e5c0">${barcode}</strong><br>Analysing...`);
analyse(barcode);
}
async function analyse(barcode) {
const profile = JSON.parse(localStorage.getItem("hg_profile") || "{}");
try {
const res = await fetch(WEBHOOK, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ barcode, profile, ts: new Date().toISOString() })
});
if (!res.ok) throw new Error("Server " + res.status);
const data = await res.json();
saveHistory(barcode, data);
showResult(data);
} catch(e) {
setStatus("n", "Could not reach server: " + e.message);
}
}
function saveHistory(barcode, data) {
const history = JSON.parse(localStorage.getItem("hg_history") || "[]");
history.unshift({
barcode, ts: new Date().toISOString(),
name: data.product_name, rating: data.rating,
kcal: data.calories_per_serving, source: data.data_source
});
localStorage.setItem("hg_history", JSON.stringify(history.slice(0, 200)));
}
function showResult(d) {
const rm = { "Healthy":"healthy","Moderately Healthy":"moderate","Unhealthy":"unhealthy" };
const badge = document.getElementById("badge");
badge.textContent = d.rating || "?";
badge.className = "badge " + (rm[d.rating] || "moderate");
document.getElementById("pname").textContent = d.product_name || "Unknown";
  document.getElementById("sum").textContent = d.summary || "";
// Medical condition alerts
const medEl = document.getElementById("med-alerts");
if (d.medical_alerts && d.medical_alerts.length) {
medEl.textContent = "nn " + d.medical_alerts.join(" | ");
medEl.style.display = "block";
} else { medEl.style.display = "none"; }
// Tip
const tipEl = document.getElementById("tip");
if (d.tip) { tipEl.textContent = "n " + d.tip; tipEl.style.display = "block"; }
else { tipEl.style.display = "none"; }
document.getElementById("src").textContent = d.data_source ? "nn " + d.data_source : "";
// Calorie bar
if (d.consumed_today != null && d.goal) {
const pct = Math.min(100, (d.consumed_today / d.goal) * 100);
const fill = document.getElementById("cal-fill");
fill.style.width = pct + "%";
fill.style.background = pct > 90 ? "#f87171" : pct > 70 ? "#fbbf24" : "#34d399";
document.getElementById("cal-txt").textContent =
`${d.consumed_today} / ${d.goal} kcal today`;
}
document.getElementById("result").style.display = "block";
setStatus("n", "Done! Tap Scan Again for next product.");
}
function setStatus(icon, html) {
document.getElementById("si").innerHTML = icon;
document.getElementById("st").innerHTML = html;
}
function clearResult() { document.getElementById("result").style.display="none"; }
window.addEventListener("load", () => { loadProfile(); startScan(); });
</script>
</body>
</html>
